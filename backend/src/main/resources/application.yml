spring:
  application:
    name: quickpoll
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
  sql:
    init:
      mode: always
      continue-on-error: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
logging:
  level:
    org:
      springframework:
        security: DEBUG
      hibernate:
        engine:
          jdbc:
            batch: DEBUG
polls:
  scheduler:
    rate: 360000
