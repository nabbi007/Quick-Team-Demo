name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────
  # GITLEAKS — Secret Detection
  # ─────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks — Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────
  # BACKEND — Build & Test
  # ─────────────────────────────────────────────────
  backend:
    name: Backend (Java 17 / Spring Boot)
    runs-on: ubuntu-latest
    needs: [gitleaks]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quickpoll
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build backend
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: Run unit tests
        working-directory: ./backend
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/quickpoll
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ci-test-jwt-secret-not-for-production

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────────────
  # FRONTEND — Build
  # ─────────────────────────────────────────────────
  frontend:
    name: Frontend (Angular 19)
    runs-on: ubuntu-latest
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────────────
  # DATA ENGINEERING — Install & Validate
  # ─────────────────────────────────────────────────
  data-engineering:
    name: Data Engineering (Python 3.11)
    runs-on: ubuntu-latest
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./data-engineering
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ─────────────────────────────────────────────────
  # DOCKER BUILD — Validate images build
  # ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t quickpoll-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t quickpoll-frontend:ci ./frontend

  # ─────────────────────────────────────────────────
  # TRIVY — Container & Filesystem Vulnerability Scan
  # ─────────────────────────────────────────────────
  trivy:
    name: Trivy — Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t quickpoll-backend:ci ./backend

      - name: Build frontend image for scanning
        run: docker build -t quickpoll-frontend:ci ./frontend

      - name: Trivy — Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quickpoll-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Trivy — Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quickpoll-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Trivy — Filesystem scan (source code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────────
  # SONARQUBE — Code Quality & SAST
  # ─────────────────────────────────────────────────
  sonarqube:
    name: SonarQube — Code Quality & SAST
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build backend (needed for SonarQube analysis)
        working-directory: ./backend
        run: mvn clean compile -DskipTests -B

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
