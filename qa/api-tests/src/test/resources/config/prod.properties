# Production Environment Configuration
# QuickPoll API Testing Framework

# API Base URL
#base.url=https://api.quickpoll.com/api/v1

# Timeouts (in milliseconds)
connection.timeout=10000
response.timeout=20000

# Authentication
auth.username=prod_user
auth.password=prod_password

# Performance Thresholds (in milliseconds)
performance.threshold.get=2000
performance.threshold.post=4000
performance.threshold.put=4000
performance.threshold.patch=4000
performance.threshold.delete=2000
performance.threshold.list=3000

# Logging
log.level=WARN
