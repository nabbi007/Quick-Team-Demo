# Development Environment Configuration
# QuickPoll API Testing Framework

# API Base URL
base.url=http://localhost:8080

# Timeouts (in milliseconds)
connection.timeout=5000
response.timeout=10000

# Authentication (optional for dev environment)
auth.username=dev_user
auth.password=dev_password

# Performance Thresholds (in milliseconds)
performance.threshold.get=1000
performance.threshold.post=2000
performance.threshold.put=2000
performance.threshold.patch=2000
performance.threshold.delete=1000
performance.threshold.list=1500

# Logging
log.level=DEBUG
