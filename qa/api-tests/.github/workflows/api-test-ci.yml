name: API Test Automation CI

# Triggers: run CI on pushes/PRs to develop branch, and allow manual runs.
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  # Main test job: compiles, executes tests, prints readable summary, and uploads raw artifacts.
  test:
    runs-on: ubuntu-latest
    permissions:
      # Needed for actions that may write workflow-related outputs/artifacts.
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
      
    - name: Build with Maven
      run: mvn clean compile
      
    - name: Run tests
      run: mvn test
      # Keep pipeline going so summary/report/notification steps still run.
      continue-on-error: true
      
    # Parse Surefire XML and print a concise test health summary into workflow logs.
    - name: Test summary (Readable logs)
      if: always()
      run: |
        python3 - <<'PY'
        import glob, xml.etree.ElementTree as ET, sys, re
        # Read all Maven Surefire XML files generated by mvn test.
        files = glob.glob("target/surefire-reports/TEST-*.xml")
        total = failed = errors = skipped = 0
        failed_tests = []
        if not files:
            # Fail this summary step when reports are missing so the job is visibly unhealthy.
            print("No Surefire XML reports found in target/surefire-reports.")
            sys.exit(1)
        for f in files:
            root = ET.parse(f).getroot()
            # Aggregate suite-level counters.
            total += int(root.attrib.get("tests", 0))
            failed += int(root.attrib.get("failures", 0))
            errors += int(root.attrib.get("errors", 0))
            skipped += int(root.attrib.get("skipped", 0))
            # Collect failed test cases with compact error details for readable logs.
            for tc in root.findall("testcase"):
                name = tc.attrib.get("name", "unknown")
                for node in (tc.find("failure"), tc.find("error")):
                    if node is not None:
                        msg = (node.attrib.get("message") or "").strip()
                        msg = msg.replace("failures)", "reasons)")
                        msg = re.sub(r'org\.opentest4j\.AssertionFailedError: ', '', msg)
                        short = "\n".join(msg.splitlines()[:6])
                        if len(msg.splitlines()) > 6:
                            short += "\n  ..."
                        failed_tests.append((name, short))
        passed = total - failed - errors - skipped
        icon = "✅" if (failed == 0 and errors == 0) else "❌"
        print("==================================")
        print(f"API TEST SUMMARY {icon}")
        print("==================================")
        print(f"Total: {total} | Passed: {passed} | Failed: {failed} | Errors: {errors} | Skipped: {skipped}")
        if failed_tests:
            print("Failed:")
            for (name, reason) in failed_tests[:15]:
                print(f"  - {name}")
                print("    " + reason.replace("\n", "\n    "))
        print("==================================")
        # Bubble up failures so overall job status reflects test health.
        if failed > 0 or errors > 0:
            sys.exit(1)
        PY
      
    # Build email message from test results so notifications contain useful context.
    - name: Build email body
      if: always()
      run: |
        python3 - <<'PY'
        import glob, xml.etree.ElementTree as ET, os, re
        files = glob.glob("target/surefire-reports/TEST-*.xml")
        total = failed = errors = skipped = 0
        failed_items = []
        repo = os.environ.get("GITHUB_REPOSITORY", "")
        branch = os.environ.get("GITHUB_REF_NAME", "")
        run_url = f"{os.environ.get('GITHUB_SERVER_URL')}/{repo}/actions/runs/{os.environ.get('GITHUB_RUN_ID')}"
        repo_name = os.environ.get("GITHUB_EVENT_REPOSITORY_NAME", repo.split('/')[-1] if '/' in repo else repo)
        repo_owner = os.environ.get("GITHUB_REPOSITORY_OWNER", repo.split('/')[0] if '/' in repo else "")
        pages_url = f"https://{repo_owner}.github.io/{repo_name}/"
        if not files:
            # Gracefully create fallback notification when tests did not produce reports.
            with open("email_body.txt", "w", encoding="utf-8") as out:
                out.write(f"API Tests: FAIL\nNo test reports.\nRun: {run_url}")
            raise SystemExit(0)
        for fpath in files:
            root = ET.parse(fpath).getroot()
            total += int(root.attrib.get("tests", 0))
            failed += int(root.attrib.get("failures", 0))
            errors += int(root.attrib.get("errors", 0))
            skipped += int(root.attrib.get("skipped", 0))
            for tc in root.findall("testcase"):
                name = tc.attrib.get("name", "unknown")
                for node in (tc.find("failure"), tc.find("error")):
                    if node is not None:
                        msg = (node.attrib.get("message") or "").strip()
                        msg = re.sub(r'org\.opentest4j\.AssertionFailedError: ', '', msg)
                        short = "\n".join(msg.splitlines()[:6])
                        failed_items.append((name, short))
        passed = total - failed - errors - skipped
        status = "PASS ✅" if (failed == 0 and errors == 0) else "FAIL ❌"
        # Email body is plain text with the same key metrics/links.
        email_lines = [
            f"API Tests: {status}",
            f"Total: {total} | Passed: {passed} | Failed: {failed} | Errors: {errors} | Skipped: {skipped}",
            "", 
            f"Repo: {repo} | Branch: {branch}",
            f"Run: {run_url}",
            f"📊 Allure Report: {pages_url}"
        ]
        if failed_items:
            email_lines.insert(2, "Failed:")
            for (name, reason) in failed_items[:12]:
                email_lines.append(f"- {name}: {reason}")
        with open("email_body.txt", "w", encoding="utf-8") as f:
            f.write("\n".join(email_lines))
        PY
      
    # Send email notification
    - name: Send Email report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: API Tests - ${{ job.status == 'success' && 'PASS' || 'FAIL' }} - ${{ github.repository }} - ${{ github.ref_name }}
        to: ${{ secrets.EMAIL_TO }}
        from: yoshninjas.1@gmail.com
        secure: false
        # Action expects file:// URI when body content is read from disk.
        body: file://email_body.txt
      
    # Debug: print Surefire reports on failure
    - name: Print Surefire reports (on failure)
      if: failure()
      run: |
        ls -la target/surefire-reports || true
        for f in target/surefire-reports/*.txt; do [ -f "$f" ] && cat "$f"; done
      
    # Persist raw test artifacts for later inspection or downstream jobs.
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: target/allure-results/
        retention-days: 30
      
    - name: Upload Surefire Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports/
        retention-days: 30

  # Reporting job: builds/publishes Allure report even if tests fail (for visibility).
  allure-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
      
    - name: Download Allure Results
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: target/allure-results
      
    # Checkout gh-pages to preserve history
    - name: Load test report history
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages
      continue-on-error: true
      
    # Copy history for trends
    - name: Copy history to allure-results
      run: |
        mkdir -p target/allure-results/history
        if [ -d "gh-pages/history" ]; then
          cp -r gh-pages/history/* target/allure-results/history/ 2>/dev/null || true
        fi
      
    # Verify Allure results exist before report generation to fail fast on missing inputs.
    - name: Verify Allure results
      run: |
        if [ ! -d "target/allure-results" ]; then
          echo "::error::target/allure-results not found."
          exit 1
        fi
        N_RESULT=$(find target/allure-results -maxdepth 1 -type f -name "*-result.json" 2>/dev/null | wc -l)
        N_CONTAINER=$(find target/allure-results -maxdepth 1 -type f -name "*-container.json" 2>/dev/null | wc -l)
        N=$((N_RESULT + N_CONTAINER))
        if [ "$N" -eq 0 ]; then
          echo "::error::No Allure result/container JSON in target/allure-results."
          ls -la target/allure-results
          exit 1
        fi
        echo "Allure results: $N file(s)."
      
    # Generate static HTML report from target/allure-results.
    - name: Generate Allure Report
      run: mvn allure:report
      
    # Prepare report for GitHub Pages
    - name: Prepare report for GitHub Pages
      run: |
        mkdir -p allure-report-final
        if [ -d "target/site/allure-maven-plugin" ]; then
          cp -r target/site/allure-maven-plugin/* allure-report-final/
          echo "Copied from target/site/allure-maven-plugin"
        elif [ -d "target/allure-report" ]; then
          cp -r target/allure-report/* allure-report-final/
          echo "Copied from target/allure-report"
        else
          echo "::error::No Allure report directory found."
          ls -la target/
          ls -la target/site/ || true
          exit 1
        fi
        ls -la allure-report-final/
      
    # Publish generated static site to gh-pages so report URL stays stable across runs.
    - name: Publish Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report-final
      
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report-final/
        retention-days: 30

  # Optional parity check: run the same test image in Docker to validate containerized execution.
  docker-test:
    runs-on: ubuntu-latest
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker image
      run: docker build -t api-test-automation .
      
    - name: Run tests in Docker
      # --rm removes the container after exit; results survive only via mounted /app/target.
      run: docker run --rm -v $(pwd)/target:/app/target api-test-automation
      continue-on-error: true
      
    - name: Upload Docker Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: docker-test-results
        path: target/surefire-reports/
        retention-days: 30
