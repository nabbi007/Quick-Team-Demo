name: data-engineering

vars:
  PYTHON: uv run python
  PY: uv run

scripts:
  # Run main entry point
  run: uv run python main.py
  main: uv run python main.py

  # Environment & dependencies
  sync: uv sync
  lock: uv lock
  add: uv add

  # Development
  dev: uv run python main.py
  seed-ai: uv run python scripts/seed_ai_oltp.py

  # Code quality
  lint: uv run ruff check .
  lint-fix: uv run ruff check . --fix
  format: uv run ruff format --check .
  format-fix: uv run ruff format .

  # Testing
  test: uv run pytest tests/ -v
  test-cov: uv run pytest tests/ -v --cov=src/data_engineering --cov-report=term-missing
