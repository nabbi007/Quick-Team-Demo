name: data-engineering

vars:
  PYTHON: uv run python
  PY: uv run

scripts:
  # Run main entry point
  run: uv run python main.py
  main: uv run python main.py

  # Environment & dependencies
  sync: uv sync
  lock: uv lock
  add: uv add

  # Development
  dev: uv run python main.py
  seed-ai: uv run python scripts/seed_ai_oltp.py --profile small
  seed-ai-small-10: uv run python scripts/seed_ai_oltp.py --profile small --chunks 10
  seed-ai-70b: uv run python scripts/seed_ai_oltp.py --model llama-3.3-70b-versatile --fallback-model llama-3.3-70b-versatile
  seed: uv run python scripts/seed_data.py
  mock-produce: uv run python scripts/mock_producer.py
  seed-publish: uv run python scripts/seed_and_publish.py

  # Backfill modes
  backfill: uv run python main.py
  backfill-full: uv run python -c "import os; os.environ['FORCE_FULL_BACKFILL']='true'; from main import main; main()"

  # Code quality
  lint: uv run ruff check .
  lint-fix: uv run ruff check . --fix
  format: uv run ruff format --check .
  format-fix: uv run ruff format .
  check: uv run ruff check . && uv run ruff format --check .
  
  # Testing
  test: uv run pytest tests/ -v
  test-cov: uv run pytest tests/ -v --cov=src/data_engineering --cov-report=term-missing
  test-unit: uv run pytest tests/unit/ -v
  test-backfill: uv run pytest tests/unit/test_backfill.py tests/unit/test_watermarks.py -v
  test-streaming: uv run pytest tests/unit/test_streaming.py -v
